name: alkhair_mobileapp
description: AlKhair ERP Mobile — Delegate & Admin Field Operations Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.7.0

  # Networking
  dio: ^5.7.0

  # Secure session-scoped auth token storage
  flutter_secure_storage: ^9.2.2

  # GPS / Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Bluetooth ESC/POS thermal printing (80mm)
  print_bluetooth_thermal: ^1.2.1

  # Image loading and caching
  cached_network_image: ^3.4.1

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  # Source logo has genuine alpha transparency (~76% of pixels) around the
  # mark — iOS requires opaque icons (Apple flattens transparency to black
  # otherwise), so flatten to white here to match how the logo already
  # displays against light backgrounds elsewhere in the app.
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
