name: alkhair_mobileapp
description: AlKhair ERP Mobile — Delegate & Admin Field Operations Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.7.0

  # Networking
  dio: ^5.7.0

  # Secure session-scoped auth token storage
  flutter_secure_storage: ^9.2.2

  # GPS / Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Bluetooth ESC/POS thermal printing (80mm)
  print_bluetooth_thermal: ^1.2.1

  # Image loading and caching
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
